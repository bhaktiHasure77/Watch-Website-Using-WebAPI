      crossorigin="anonymous"

    />

     <style>
body {
    margin: 0;
    padding: 0;
    background-color: #d4cbc3;
    /* fdf8f2; */
      font-family: "Georgia", serif;

    
}

/* PAGE TITLE */
h2 {
    text-align: center;
    margin-top: 20px;
    color: #1b2a2c;
}

/* MAIN CONTAINER */
.container {
 margin: 50px 200px 80px 180px;
     padding: 35px;
    width: 1100px;
    height: 700px;
    background-color: #fdf8f2;
    display: flex;
    gap: 30px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
}

/* IMAGE SECTION */
.image img {
    height: 570px;
    width: 450px;
    object-fit: cover;
    border-radius: 10px;
    border: 3px solid #666565;
}

/* FORM SECTION */
.product {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20x;
    align-items: start;
}

/* EACH ROW */
.field {
    display: grid;
    grid-template-columns: 160px 300px; /* reduced input width */
    align-items: center;
    column-gap: 20px;
    padding: 8px;
    margin: 3px;
    border: 2px solid #66656591;
    border-radius: 6px;
    background-color: #a19d98;
}

/* LABEL */
.field label {
    text-align: left;
    font-weight: bold;
    color: #1f2d2f;
    padding: 8px;
    background-color: #a19d98;
    border-radius: 4px;
}

/* INPUTS */
.field input,
.field select,
.field textarea {
    padding: 8px;
    border: 2px solid #3f3f3f;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    background-color: #f0f7f6;
    width: 100%;
}

/* FOCUS EFFECT */
.field input:focus,
.field select:focus,
.field textarea:focus {
    border-color: #2f5f66;
    box-shadow: 0 0 5px rgba(47, 95, 102, 0.5);
}

/* BUTTON CONTAINER */
.buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    width: 100%;
}

/* BUTTONS */
button {
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    background-color: #666565;
    padding: 17px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    color: #fffefe;
    transition: 0.3s;
    font-size: 13px;
}

button:hover {
    background-color: #fdf8f2;
    color: #000000;
}
</style>

</head>
<body>
    <div class="navbar"></div>
    <div class="main">
            <h2>Product Manager</h2>
            <div class="container">
                <div class="image">
                    <img id="imgProduct" src="" />
                </div>
                <div class="product">
                    <div class="field">
                        <label>Product ID:</label> 
                        <select id="ddlprodID"></select>
                    </div>

                    <div class="field">
                        <label>Product Name:</label>
                        <input type="text" id="txtName" required>
                    </div>

                    <div class="field">
                        <label>For gender :</label>
                        <select id="ddlCategory" required></select>
                    </div>

                    <div class="field">
                        <label>Brand:</label>
                        <select id="ddlBrand" required></select>
                    </div>

                    <div class="field">
                        <label>Product Image:</label>
                        <input type="file" id="txtImage" required>
                    </div>

                    <div class="field">
                        <label>Quantity:</label>
                        <input type="text" id="txtQuantity" required>
                    </div>

                    <div class="field">
                        <label>Price:</label>
                        <input type="text" id="txtPrice" required>
                    </div>

                    <div class="field">
                        <label>Description:</label>
                        <textarea id="prodDescription" rows="2" required></textarea>
                    </div>

                    <div class="buttons" style="margin: 20px; display: flexbox;">
                        <button type="button" onclick="addProduct()" >Add Product</button>
                        <button type="button" onclick="Save()" > Save Details</button><br>
                        <button type="button" onclick="Edit()" >Edit Details</button>
                        <button  type="button" onclick="updateProduct()" >Update Details</button><br>
                        <button  type="button" onclick="deleteProduct()" >Delete Product</button>
                        </div>
                    </div>
                </div>
            </div>
    <div class="footer"></div>
</body>


<script>
    // const prodApi = "http://localhost:55801/api/Product";
const catApi = "http://localhost:50312/api/Category";
const brandApi = "http://localhost:50312/api/Brand";

let categoryList = [];
let brandList=[];
$(document).ready(function () {
    loadCategory();
    loadProductID();
    loadBrand();

    //  Correct file change handler
    $("#txtImage").change(function () {
        let file = this.files[0];
        if (!file) return;

        let path = "img/" + file.name;
        $(this).attr("data-path", path);
    });

    //  Product dropdown change
    $("#ddlprodID").change(function () {
        let id = $(this).val();

        $.ajax({
            url: prodApi,
            type: "GET",
            success: (prod) => {
                let product = prod.find(e => e.ProdID == id);
                if (product) {
                    fillData(product);
                    disableForm();
                }
            },
            error: () => alert("Error fetching product")
        });
    });
});


//  Load Categories
function loadCategory() {
    $.ajax({
        url: catApi,
        type: "GET",
        success: (cats) => {
            categoryList = cats;

            let option = "";
            cats.forEach(c => {
                option += `<option value="${c.CatID}">${c.CatName}</option>`;
            });

            $("#ddlCategory").html(option);
        },
        error: () => alert("Error loading categories")
    });
}

function loadBrand() {
    $.ajax({
        url: brandApi,
        type: "GET",
        success: (brands) => {
            brandList = brands;

            let option = "";
            brands.forEach(b => {
                option += `<option value="${b.BrandID}">${b.BrandName}</option>`;
            });

            $("#ddlBrand").html(option);
        },
        error: () => alert("Error loading Brands")
    });
}

//  Load Product IDs
function loadProductID() {
    $.ajax({
        url: prodApi,
        type: "GET",
        success: (prod) => {
            let option = "";

            prod.forEach(p => {
                option += `<option value="${p.ProdID}">${p.ProdID}</option>`;
            });

            $("#ddlprodID").html(option);

            if (prod.length > 0) {
                fillData(prod[0]);
                disableForm();
            }
        },
        error: () => alert("Error loading products")
    });
}


//  Fill form data (FIXED)
function fillData(prod) {
    $("#txtName").val(prod.Name);
    $("#ddlCategory").val(String(prod.CatID));
    $("#ddlBrand").val(String(prod.BrandID));
$("#txtImage").attr("data-path", prod.Image);
    $("#imgProduct").attr("src", prod.Image);
    $("#txtQuantity").val(prod.Qty);
    $("#txtPrice").val(prod.Price);
    $("#prodDescription").val(prod.DSC);
}


//  Get form data
function getData() {
    let name = $("#txtName").val();
    let category = parseInt($("#ddlCategory").val());
    let brand=parseInt($("#ddlBrand").val());
    let qty = parseInt($("#txtQuantity").val());
    let price = parseFloat($("#txtPrice").val());
    let img = $("#txtImage").attr("data-path");
    let desc = $("#prodDescription").val();

    // Validation
    if (!name) return alert("Enter Product Name");
    if (isNaN(category)) return alert("Select Category");
    if (isNaN(brand)) return alert("Select Brand");

    if (!img) return alert("Select Image");
    if (isNaN(qty) || qty <= 0) return alert("Invalid Quantity");
    if (isNaN(price) || price <= 0) return alert("Invalid Price");
    if (!desc) return alert("Enter Description");

    return {
        ProdID: parseInt($("#ddlprodID").val()) || 0,
        Name: name,
        CatID: category,
        BrandID:brand,
        Image: img,
        Qty: qty,
        Price: price,
        DSC: desc
    };
}


//  Clear form
function clearForm() {
    $("#ddlprodID").val("");
    $("#txtName").val("");
    $("#ddlCategory").val("");
    $("#ddlBrand").val("");
    $("#txtImage").val("").removeAttr("data-path");
    $("#imgProduct").attr("src", "");
    $("#txtQuantity").val("");
    $("#txtPrice").val("");
    $("#prodDescription").val("");
}


//  Enable / Disable
function enableForm() {
    $("#txtName, #txtQuantity, #ddlCategory,#ddlBrand, #txtImage, #txtPrice, #prodDescription").prop("disabled", false);
}

function disableForm() {
    $("#txtName, #txtQuantity, #ddlCategory,#ddlBrand, #txtImage, #txtPrice, #prodDescription").prop("disabled", true);
}


//  Add
function addProduct() {
    clearForm();
    enableForm();
}


//  Save (POST)
function Save() {
    let prod = getData();
    if (!prod) return;

    $.ajax({
        url: prodApi,
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(prod),
        success: () => {
            alert("Product Added!");
            clearForm();
            loadProductID();
        },
        error: () => alert("Error Saving Product")
    });
}


//  Edit
function Edit() {
    enableForm();
}


//  Update (PUT)
function updateProduct() {
    let prod = getData();
    if (!prod) return;

    $.ajax({
        url: prodApi,
        type: "PUT",
        contentType: "application/json",
        data: JSON.stringify(prod),
        success: () => {
            alert("Product Updated!");
            disableForm();
            loadProductID();
        },
        error: () => alert("Error Updating Product")
    });
}


//  Delete
function deleteProduct() {
    let id = $("#ddlprodID").val();
    if (!id) return alert("Select product");

    if (!confirm("Are you sure to delete?")) return;

    $.ajax({
        url: `${prodApi}?id=${id}`,
        type: "DELETE",
        success: () => {
            alert("Product Deleted!");
            clearForm();
            loadProductID();
        },
        error: () => alert("Error deleting product")
    });
}
</script>
