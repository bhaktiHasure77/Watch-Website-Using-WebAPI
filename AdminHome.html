     <style>
        body {
    margin: 0;
    padding: 0;
    background-color: #d4cbc3;
      font-family: "Georgia", serif;

}

/* MAIN CONTAINER - CENTER EVERYTHING */
.main {
    min-height: 80vh;
    display: flex;
    justify-content: center;   /* horizontal center */
    align-items: center;       /* vertical center */
    gap: 40px;                 /* space between cards */
}

/* CARD DESIGN */
.cards {
    height: 200px;
    width: 300px;
    background-color: #a19d98;
    border: 2px solid #666565;
    border-radius: 20px;

    display: flex;
    justify-content: center;
    align-items: center;

    transition: 0.3s;
}

/* LINK STYLE */
.cards a {
    text-decoration: none;
    color: black;
    font-weight: bold;
    text-align: center;

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

    text-align: center;
} */
/* ICON */
.icon {
    font-size: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TEXT */
.cards p {
    margin: 0;
    font-size: 16px;
}

/* 🔥 HOVER EFFECT */
.cards:hover {
   
    transform: translateY(-10px) scale(1.05);
    background-color: #fdf8f2;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* ICON HOVER */
.cards:hover .icon {
 color: #000000;
     transform: scale(1.2);
}

/* TEXT HOVER */
.cards:hover p {
 color: #000000;
}
