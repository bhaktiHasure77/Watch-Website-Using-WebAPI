<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./NavCatFoot.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Jquery -->
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    
    <title>Contact</title>
</head>
<body>
     <!-- navbar -->
    <div class="navbar"></div>
<div style=" background-color: #d4cbc3;margin: 0px;">
     
 
      <!-- Contact Section -->
       <section style="padding:60px; text-align:center;">
        <h1 style="font-size:40px;">Contact Us</h1>
        <p style="margin:10px;">We’d love to hear from you!</p>
         <!-- Form -->

         <form style="max-width:500px; margin:20px auto; display:flex; flex-direction:column;">

<input id="name" type="text" placeholder="Your Name" required 
  style="margin:10px; padding:12px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); border:1px solid #ccc; border-radius:5px;">

<input id="email" type="email" placeholder="Your Email" required 
  style="margin:10px; padding:12px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); border:1px solid #ccc; border-radius:5px;">

<textarea id="msg" placeholder="Your Message" rows="5" required
  style="margin:10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); padding:12px; border:1px solid #ccc; border-radius:5px;"></textarea>

<button type="button" onclick="Message()"
  style="padding:12px; background-color:#fdf8f2;  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);color:#000000;font-weight: bold; border:none; border-radius:5px; cursor:pointer;">
  Submit
</button>
  </form>
  <!-- Contact Info -->

  <div style="margin-top:30px; font-size:18px;">
    <p><strong>Email:</strong> support@luxuarious.com</p>
    <p><strong>Phone:</strong> +91 98765 43210</p>
    <p><strong>Location:</strong> Mumbai, India</p>
  </div>
</section>
    </div>

   <div class="footer"></div>
</body>
<script src="./JS/NavFoot.js"></script>

<script>
  function Message(){
    let name=$("#name").val();
    let email=$("#email").val();
    let msg=$("#msg").val();
    if(!name || !email||!msg){
      alert("Name, Email or Message box is empty,Please enter details then Try Again!! ");
    }else{
    alert("Thank You for reaching out! We have recieved your message. We will get back to you after reviewing this");
  }
}

</script>
<script src="./JS/func.js"></script>
</html>
